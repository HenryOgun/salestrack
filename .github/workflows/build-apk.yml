name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -alias salestrack \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass salestrack \
            -keypass salestrack \
            -dname "CN=SalesTrack, OU=DiamondFM, O=DiamondFM, L=Lagos, ST=Lagos, C=NG" \
            -noprompt

      - name: Init Android TWA project
        run: yes "" | bubblewrap init --manifest https://henryogun.github.io/salestrack/manifest.json
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'

      - name: Build APK
        run: |
          echo "salestrack" | bubblewrap build
        env:
          BUBBLEWRAP_SIGNING_KEY_STORE_PASS: salestrack
          BUBBLEWRAP_SIGNING_KEY_PASS: salestrack

      - name: Find APK files
        run: find . -name "*.apk" -not -path "*/node_modules/*" 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SalesTrack-Android-APK
          path: |
            **/*.apk
            !**/node_modules/**
          if-no-files-found: warn
          retention-days: 30
