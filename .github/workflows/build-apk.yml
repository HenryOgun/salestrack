name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add Android SDK tools to PATH
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK components
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platforms;android-33"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -alias salestrack \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass salestrack \
            -keypass salestrack \
            -dname "CN=SalesTrack, O=DiamondFM, C=NG" \
            -noprompt

      - name: Init Android TWA project
        run: bubblewrap init --manifest https://henryogun.github.io/salestrack/manifest.json
        env:
          CI: 'true'

      - name: Build APK
        run: printf 'salestrack\nsalestrack\n' | bubblewrap build --skipPwaShellUpdate

      - name: Find APK files
        run: find . -name "*.apk" -not -path "*/node_modules/*" | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SalesTrack-Android-APK
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 30
